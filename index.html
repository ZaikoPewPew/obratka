<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Обратка</title>
    <link rel="icon" href="/assets/svg/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/entrance.css" />
    <link rel="stylesheet" href="/styles/iframe-shell.css" />
    <link rel="stylesheet" href="/styles/success-screen.css" />
    <link rel="stylesheet" href="/styles/report-screen.css" />
    <link rel="stylesheet" href="/styles/ban-screen.css" />
    <link rel="stylesheet" href="/styles/home-screen.css" />
  </head>
  <body>
    <main class="iframe-shell" hidden>
      <header
        class="iframe-shell__controls"
        data-i18n-aria="controlsAria"
        aria-label="Управление айфреймом"
      >
        <div class="iframe-shell__actions">
          <button
            type="button"
            class="iframe-shell__btn iframe-shell__btn--icon"
            data-action="frame-back"
            data-i18n-aria="frameBackButton"
            data-i18n-title="frameBackButtonTitle"
            title="Назад"
          >
            <svg
              class="iframe-shell__btn-icon"
              width="18"
              height="18"
              viewBox="0 0 18 18"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path
                d="M8.25 13.5L3.75 9L8.25 4.5M3.75 9H14.25"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <button
            type="button"
            class="iframe-shell__btn iframe-shell__btn--icon"
            data-action="frame-forward"
            data-i18n-aria="frameForwardButton"
            data-i18n-title="frameForwardButtonTitle"
            title="Вперёд"
          >
            <svg
              class="iframe-shell__btn-icon"
              width="18"
              height="18"
              viewBox="0 0 18 18"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path
                d="M9.75 13.5L14.25 9L9.75 4.5M14.25 9H3.75"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <button
            type="button"
            class="iframe-shell__btn iframe-shell__btn--icon"
            data-action="reload-frame"
            data-i18n-aria="reloadFrameButton"
            data-i18n-title="reloadFrameButtonTitle"
            title="Обновить фрейм"
          >
            <svg
              class="iframe-shell__btn-icon"
              width="18"
              height="18"
              viewBox="0 0 18 18"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path
                d="M15.7383 4.5V7.5H12.75M15.7383 7.5L13.2426 4.75736C10.8995 2.41421 7.1005 2.41421 4.75736 4.75736C2.41421 7.1005 2.41421 10.8995 4.75736 13.2426C7.1005 15.5858 10.8995 15.5858 13.2426 13.2426C13.8305 12.6547 14.2709 11.9752 14.5638 11.25"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>

        <div
          class="iframe-shell__timer"
          role="timer"
          aria-live="polite"
          aria-atomic="true"
        >
          <span class="iframe-shell__timer-value" data-timer>00:00:00</span>
        </div>

        <div class="iframe-shell__person">
          <span
            class="iframe-shell__name"
            data-portfolio-name
            data-i18n="brandName"
          >Обратка</span>
          <img
            class="iframe-shell__avatar iframe-shell__avatar--brand"
            data-portfolio-avatar
            data-i18n-aria="brandLogoAlt"
            alt="Обратка"
            width="36"
            height="36"
          />
        </div>
      </header>

      <div class="iframe-shell__workspace" data-workspace>
        <section
          class="iframe-shell__frame"
          data-i18n-aria="frameAria"
          aria-label="Портфолио"
          data-frame
        >
          <iframe
            id="portfolio-frame"
            class="iframe-shell__iframe"
            src="about:blank"
            title="Портфолио"
            loading="eager"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>

          <div
            class="iframe-shell__external"
            data-external-viewer
            hidden
            aria-hidden="true"
          >
            <div class="iframe-shell__external-card">
              <p
                class="iframe-shell__external-title"
                data-i18n="embedBlockedTitle"
              >Этот сайт нельзя показать во фрейме</p>
              <p class="iframe-shell__external-body" data-external-body></p>
              <button
                type="button"
                class="iframe-shell__external-open"
                data-action="open-external"
                data-i18n="embedBlockedOpen"
              >Открыть портфолио</button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
