<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>Memento — waitlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/desktop.css" />
    <link rel="stylesheet" href="/styles/apply.css" />
    <link rel="stylesheet" href="/styles/startup-card.css" />
    <link rel="stylesheet" href="/styles/mobile.css" />
  </head>
  <body>
    <div class="layout-desktop" aria-hidden="false">
      <main class="desktop-root">
        <header class="desktop-top">
          <div
            data-mount="logo"
            data-width="47"
            data-height="24"
            data-logo-class="desktop-logo"
          ></div>
          <div class="desktop-top__right">
            <div data-mount="header-actions"></div>
          </div>
        </header>

        <div class="desktop-center">
          <div data-mount="apply-card"></div>
        </div>
        <div data-mount="startup-fall-back"></div>
        <div data-mount="startup-fall"></div>
        <div class="water-waves" aria-hidden="true">
          <div class="water-waves__layer water-waves__layer--back">
            <svg
              class="water-waves__svg"
              viewBox="0 0 2400 276"
              preserveAspectRatio="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                fill="#F3F4F7"
                d="M0,176 C200,104 400,248 600,176 C800,104 1000,248 1200,176 C1400,104 1600,248 1800,176 C2000,104 2200,248 2400,176 L2400,276 L0,276 Z"
              />
            </svg>
          </div>
          <div class="water-waves__layer water-waves__layer--front">
            <svg
              class="water-waves__svg"
              viewBox="0 0 2400 276"
              preserveAspectRatio="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                fill="rgba(230, 230, 230, 0.41)"
                d="M0,192 C240,136 420,236 600,192 C780,136 960,236 1200,192 C1440,136 1620,236 1800,192 C1980,136 2160,236 2400,192 L2400,276 L0,276 Z"
              />
            </svg>
          </div>
        </div>
        <div data-mount="site-footer"></div>
      </main>
    </div>

    <div class="layout-mobile" aria-hidden="true">
      <main class="mobile-root">
        <header class="mobile-top">
          <div data-mount="header-actions" data-header-variant="mobile"></div>
        </header>

        <section class="mobile-hero">
          <div
            data-mount="logo"
            data-width="57"
            data-height="29"
            data-logo-class="mobile-logo"
          ></div>
          <div data-mount="apply-hero"></div>
        </section>

        <div class="mobile-stage">
          <div data-mount="startup-fall-back"></div>
          <div data-mount="startup-fall"></div>
        </div>

        <section class="mobile-bottom">
          <div data-mount="apply-form"></div>
        </section>
        <div class="water-waves" aria-hidden="true">
          <div class="water-waves__layer water-waves__layer--back">
            <svg
              class="water-waves__svg"
              viewBox="0 0 2400 276"
              preserveAspectRatio="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                fill="#F3F4F7"
                d="M0,176 C200,104 400,248 600,176 C800,104 1000,248 1200,176 C1400,104 1600,248 1800,176 C2000,104 2200,248 2400,176 L2400,276 L0,276 Z"
              />
            </svg>
          </div>
          <div class="water-waves__layer water-waves__layer--front">
            <svg
              class="water-waves__svg"
              viewBox="0 0 2400 276"
              preserveAspectRatio="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                fill="rgba(230, 230, 230, 0.41)"
                d="M0,192 C240,136 420,236 600,192 C780,136 960,236 1200,192 C1440,136 1620,236 1800,192 C1980,136 2160,236 2400,192 L2400,276 L0,276 Z"
              />
            </svg>
          </div>
        </div>
        <div data-mount="site-footer"></div>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
