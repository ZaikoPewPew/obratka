<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memento — waitlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/desktop.css" />
    <link rel="stylesheet" href="/styles/apply.css" />
    <link rel="stylesheet" href="/styles/mobile.css" />
  </head>
  <body>
    <div class="layout-desktop" aria-hidden="false">
      <main class="desktop-root">
        <header class="desktop-top">
          <div
            data-mount="logo"
            data-width="47"
            data-height="24"
            data-logo-class="desktop-logo"
          ></div>
          <div class="desktop-top__right">
            <div data-mount="timer"></div>
          </div>
        </header>

        <div class="desktop-center">
          <div data-mount="apply-card"></div>
        </div>
        <div data-mount="site-footer"></div>
      </main>
    </div>

    <div class="layout-mobile" aria-hidden="true">
      <main class="mobile-root">
        <header class="mobile-top">
          <div
            data-mount="logo"
            data-width="48"
            data-height="24"
            data-logo-class="mobile-logo"
          ></div>
          <div data-mount="timer" data-timer-variant="mobile"></div>
        </header>
        <div class="mobile-center">
          <div data-mount="apply-card"></div>
        </div>
        <div data-mount="site-footer"></div>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
