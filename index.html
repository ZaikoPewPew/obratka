<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>Memento — waitlist</title>
    <link rel="icon" href="/assets/svg/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/entrance.css" />
    <link rel="stylesheet" href="/styles/desktop.css" />
    <link rel="stylesheet" href="/styles/apply.css" />
    <link rel="stylesheet" href="/styles/access-modal.css" />
    <link rel="stylesheet" href="/styles/privacy-policy-panel.css" />
    <link rel="stylesheet" href="/styles/notification.css" />
    <link rel="stylesheet" href="/styles/mobile.css" />
  </head>
  <body>
    <!-- Десктопный лейаут (показывается от 768px). -->
    <div class="layout-desktop" aria-hidden="false">
      <main class="desktop-root">
        <header class="desktop-top">
          <div
            data-mount="logo"
            data-width="47"
            data-height="24"
            data-logo-class="desktop-logo"
          ></div>
          <div class="desktop-top__right">
            <div data-mount="header-actions"></div>
          </div>
        </header>

        <div class="desktop-center">
          <div data-mount="apply-card"></div>
        </div>
        <div data-mount="site-footer"></div>
      </main>
    </div>

    <!-- Мобильный лейаут (показывается до 767px). -->
    <div class="layout-mobile" aria-hidden="true">
      <main class="mobile-root">
        <header class="mobile-top">
          <div data-mount="header-actions" data-header-variant="mobile"></div>
        </header>

        <section class="mobile-hero">
          <div
            data-mount="logo"
            data-width="57"
            data-height="29"
            data-logo-class="mobile-logo"
          ></div>
          <div data-mount="apply-hero"></div>
        </section>

        <section class="mobile-bottom">
          <div data-mount="apply-form"></div>
        </section>
      </main>
    </div>

    <!-- Точка входа приложения: монтирует все интерактивные компоненты. -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
